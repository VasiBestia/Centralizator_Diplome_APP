<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Setări Cont - Family Docs</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/global.css" />
    <link rel="stylesheet" href="CSS/componente.css" />
    <link rel="stylesheet" href="CSS/auth.css" />
  </head>
  <body class="body_login">
    <div class="fundal_gradient"></div>

    <div class="wrapper_login" style="max-width: 500px">
      <div class="zona_formular_box box_login_special">
        <div class="header_login">
          <h2>Setări Cont</h2>
          <p>Actualizează-ți datele și poza de profil</p>
        </div>

        <form id="settingsForm">
          <div
            style="
              display: flex;
              flex-direction: column;
              align-items: center;
              margin-bottom: 24px;
            "
          >
            <div
              class="avatar_cerc"
              id="previewPoza"
              style="
                width: 80px;
                height: 80px;
                font-size: 2rem;
                margin-bottom: 12px;
                background-size: cover;
                background-position: center;
              "
            >
              ?
            </div>
            <label
              for="inputPoza"
              style="
                cursor: pointer;
                color: var(--culoare_brand);
                font-size: 0.85rem;
                font-weight: 500;
              "
              >Schimbă Poza</label
            >
            <input
              type="file"
              id="inputPoza"
              accept="image/png, image/jpeg"
              style="display: none"
            />
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
            <div class="grup_form">
              <label>Nume</label>
              <input type="text" id="numeSetari" required />
            </div>
            <div class="grup_form">
              <label>Prenume</label>
              <input type="text" id="prenumeSetari" required />
            </div>
          </div>

          <div
            id="mesajStatusSetari"
            class="mesaj_eroare"
            style="display: none"
          ></div>

          <button class="btn_actiune_salvare btn_login" type="submit">
            <span>Salvează Modificările</span>
          </button>

          <div class="optiuni_cont">
            <a href="index.html">Înapoi la Dashboard</a>
          </div>
        </form>
      </div>
    </div>

    <script src="JavaScript/settings.js?v=1.1"></script>
  </body>
</html>
